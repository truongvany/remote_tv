name: PR Checklist Enforcer

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  validate-checklist:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate required checklist in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            const requiredChecks = [
              /- \[[xX]\] Function description is complete and clear\./,
              /- \[[xX]\] Testing evidence is attached\./,
              /- \[[xX]\] At least one reviewer \(not the author\) is assigned or requested\./,
              /- \[[xX]\] Conflict handling is documented \(or explicitly marked as no conflict\)\./,
            ];

            const missing = requiredChecks
              .map((regex, index) => ({ index: index + 1, matched: regex.test(body) }))
              .filter(item => !item.matched)
              .map(item => item.index);

            if (missing.length > 0) {
              core.setFailed(
                `PR checklist is incomplete. Please check all required items in pull_request_template.md. Missing item number(s): ${missing.join(', ')}`
              );
            }
