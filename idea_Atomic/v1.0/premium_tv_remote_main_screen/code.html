<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed": "#ff794a",
            "surface-container-highest": "#262626",
            "tertiary-dim": "#db8beb",
            "error-dim": "#d7383b",
            "on-tertiary-fixed": "#380047",
            "primary-container": "#ff794a",
            "secondary-fixed-dim": "#d6d4d3",
            "on-background": "#ffffff",
            "on-primary-fixed-variant": "#561600",
            "surface-dim": "#0e0e0e",
            "surface": "#0e0e0e",
            "on-tertiary": "#641c77",
            "on-secondary-fixed-variant": "#5c5b5b",
            "inverse-surface": "#fcf9f8",
            "secondary": "#e4e2e1",
            "inverse-primary": "#ad3500",
            "error": "#ff716c",
            "primary-dim": "#ff7443",
            "secondary-fixed": "#e4e2e1",
            "on-tertiary-fixed-variant": "#631a76",
            "on-error-container": "#ffa8a3",
            "surface-container": "#1a1919",
            "surface-tint": "#ff906a",
            "on-surface-variant": "#adaaaa",
            "on-secondary": "#525151",
            "on-secondary-fixed": "#3f3f3f",
            "tertiary-fixed": "#e998fa",
            "background": "#0e0e0e",
            "inverse-on-surface": "#565555",
            "surface-variant": "#262626",
            "surface-container-lowest": "#000000",
            "on-secondary-container": "#d2d0cf",
            "surface-container-high": "#201f1f",
            "error-container": "#9f0519",
            "secondary-dim": "#d6d4d3",
            "tertiary": "#f2aaff",
            "primary": "#ff906a",
            "on-primary-container": "#451000",
            "on-primary-fixed": "#000000",
            "primary-fixed-dim": "#ff5d1f",
            "outline-variant": "#484847",
            "on-tertiary-container": "#590e6c",
            "on-error": "#490006",
            "outline": "#767575",
            "surface-bright": "#2c2c2c",
            "secondary-container": "#474747",
            "surface-container-low": "#131313",
            "tertiary-fixed-dim": "#db8beb",
            "tertiary-container": "#e998fa",
            "on-primary": "#591700",
            "on-surface": "#ffffff"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(38, 38, 38, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .dpad-gradient {
      background: radial-gradient(circle at center, #ff906a 0%, #ff5d1f 100%);
    }
    .well-inset {
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body select-none">
<!-- Top Navigation Shell -->
<header class="flex justify-between items-center px-6 h-16 w-full z-50 fixed top-0 w-full bg-[#262626]/40 backdrop-blur-xl border-none">
<div class="active:scale-95 duration-100 transition-opacity hover:opacity-80 text-[#ff906a]">
<span class="material-symbols-outlined" data-icon="power_settings_new">power_settings_new</span>
</div>
<h1 class="font-['Inter'] font-bold tracking-tight uppercase text-lg font-black text-[#e4e2e1]">LIVING ROOM TV</h1>
<div class="active:scale-95 duration-100 transition-opacity hover:opacity-80 text-[#adaaaa]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 flex flex-col items-center min-h-screen">
<!-- Device Status Display -->
<div class="w-full glass-card rounded-[2rem] p-6 mb-12 flex flex-col gap-4 border border-outline-variant/15">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Now Playing</span>
<h2 class="text-2xl font-black tracking-tight text-on-surface">The Mandalorian</h2>
<span class="text-xs text-primary-dim font-medium">S2 : E5 • Chapter 13: The Jedi</span>
</div>
<div class="bg-surface-container-highest/60 p-2 rounded-xl">
<span class="material-symbols-outlined text-primary" data-icon="4k">4k</span>
</div>
</div>
<!-- Tactile Volume Slider Representation -->
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="volume_down">volume_down</span>
<div class="flex-1 h-3 bg-surface-container-lowest rounded-full well-inset relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-3/4 bg-gradient-to-r from-primary to-primary-fixed-dim rounded-full"></div>
<div class="absolute left-[75%] top-1/2 -translate-y-1/2 -translate-x-1/2 w-6 h-6 bg-secondary rounded-lg shadow-2xl backdrop-blur-md border border-white/20"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="volume_up">volume_up</span>
</div>
</div>
<!-- The Navigation Wheel (Signature Component) -->
<div class="relative w-72 h-72 flex items-center justify-center mb-12">
<!-- Outer Ring Track -->
<div class="absolute inset-0 rounded-full bg-surface-container-lowest well-inset border border-outline-variant/10"></div>
<!-- Directional Controls -->
<div class="absolute inset-4 rounded-full dpad-gradient shadow-[0_0_50px_rgba(255,144,106,0.2)] grid grid-cols-3 grid-rows-3 items-center justify-items-center">
<!-- Up -->
<button class="col-start-2 row-start-1 active:scale-90 transition-transform text-on-primary-container/80">
<span class="material-symbols-outlined text-4xl" data-icon="keyboard_arrow_up">keyboard_arrow_up</span>
</button>
<!-- Left -->
<button class="col-start-1 row-start-2 active:scale-90 transition-transform text-on-primary-container/80">
<span class="material-symbols-outlined text-4xl" data-icon="keyboard_arrow_left">keyboard_arrow_left</span>
</button>
<!-- Center OK -->
<button class="col-start-2 row-start-2 w-24 h-24 rounded-full bg-surface-container-highest/40 backdrop-blur-2xl flex items-center justify-center border border-white/10 shadow-inner active:scale-95 transition-all">
<span class="text-lg font-black tracking-tighter text-on-surface">OK</span>
</button>
<!-- Right -->
<button class="col-start-3 row-start-2 active:scale-90 transition-transform text-on-primary-container/80">
<span class="material-symbols-outlined text-4xl" data-icon="keyboard_arrow_right">keyboard_arrow_right</span>
</button>
<!-- Down -->
<button class="col-start-2 row-start-3 active:scale-90 transition-transform text-on-primary-container/80">
<span class="material-symbols-outlined text-4xl" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</button>
</div>
</div>
<!-- Secondary Function Grid -->
<div class="w-full grid grid-cols-3 gap-6 mb-12">
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center border border-outline-variant/10 shadow-lg group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface-variant group-active:text-primary" data-icon="undo">undo</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Back</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center border border-outline-variant/10 shadow-lg group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface-variant group-active:text-primary" data-icon="home">home</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Home</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center border border-outline-variant/10 shadow-lg group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface-variant group-active:text-primary" data-icon="menu">menu</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Menu</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center border border-outline-variant/10 shadow-lg group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface-variant group-active:text-primary" data-icon="search">search</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Search</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-16 h-16 -mt-1 rounded-full bg-primary flex items-center justify-center border border-primary-fixed shadow-[0_0_20px_rgba(255,144,106,0.3)] group-active:scale-110">
<span class="material-symbols-outlined text-on-primary-fixed text-3xl" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-95 transition-all">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center border border-outline-variant/10 shadow-lg group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface-variant group-active:text-primary" data-icon="volume_off">volume_off</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Mute</span>
</button>
</div>
<!-- Streaming Service Shortcuts -->
<div class="w-full">
<div class="flex items-center justify-between mb-4">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Quick Launch</span>
<div class="h-[1px] flex-1 mx-4 bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="h-16 rounded-xl bg-surface-container-low border border-outline-variant/10 p-4 flex items-center justify-center active:scale-95 transition-all cursor-pointer overflow-hidden relative group">
<div class="absolute inset-0 bg-gradient-to-br from-red-600/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-black text-red-600 tracking-tighter text-lg z-10">NETFLIX</span>
</div>
<div class="h-16 rounded-xl bg-surface-container-low border border-outline-variant/10 p-4 flex items-center justify-center active:scale-95 transition-all cursor-pointer overflow-hidden relative group">
<div class="absolute inset-0 bg-gradient-to-br from-red-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="flex items-center gap-1 font-black tracking-tighter text-lg z-10">
<span class="material-symbols-outlined text-red-500" data-icon="smart_display" data-weight="fill" style="font-variation-settings: 'FILL' 1;">smart_display</span>
<span class="text-on-surface">YouTube</span>
</span>
</div>
<div class="h-16 rounded-xl bg-surface-container-low border border-outline-variant/10 p-4 flex items-center justify-center active:scale-95 transition-all cursor-pointer overflow-hidden relative group">
<div class="absolute inset-0 bg-gradient-to-br from-blue-600/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-black text-blue-400 tracking-tighter text-lg z-10 italic">Disney+</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full h-20 z-50 flex justify-around items-center px-8 pb-safe bg-[#000000] border-t border-[#484847]/15 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Active State: Apps/Remote mapping -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] hover:text-[#ff794a] transition-colors active:inner-shadow-lg duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] hover:text-[#ff794a] transition-colors active:inner-shadow-lg duration-200" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
</a>
<a class="flex flex-col items-center justify-center text-[#ff906a] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#ff906a] after:rounded-full active:inner-shadow-lg duration-200" href="#">
<span class="material-symbols-outlined" data-icon="apps">apps</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] hover:text-[#ff794a] transition-colors active:inner-shadow-lg duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
</body></html>
